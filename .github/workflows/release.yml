name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or refresh (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macos-dmg:
    name: Build macOS DMG
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          # WKWebExtension needs a recent SDK (Xcode 16.4+ / macOS 15.4).
          for app in \
            /Applications/Xcode_16.4.app \
            /Applications/Xcode_16.3.app \
            /Applications/Xcode_16.2.app \
            /Applications/Xcode.app
          do
            if [[ -d "$app" ]]; then
              sudo xcode-select -s "$app/Contents/Developer"
              break
            fi
          done
          xcodebuild -version
          xcodebuild -showsdks || true

      - name: Install XcodeGen + Engine build tools
        run: brew install xcodegen cmake ninja

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          YML_MARKETING="$(grep -E '^\s*MARKETING_VERSION:' project.yml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          YML_BUILD="$(grep -E '^\s*CURRENT_PROJECT_VERSION:' project.yml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          MARKETING="$YML_MARKETING"
          BUILD="$YML_BUILD"
          # Prefer versions encoded in the tag (v1.0.0-31) so a tag created from the
          # wrong commit / stale main cannot rename the release to an old build.
          if [[ "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-([0-9]+)$ ]]; then
            MARKETING="${BASH_REMATCH[1]}"
            BUILD="${BASH_REMATCH[2]}"
          elif [[ "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            MARKETING="${BASH_REMATCH[1]}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "marketing=$MARKETING" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "Resolved release $TAG → Oriel $MARKETING ($BUILD) (project.yml was $YML_MARKETING/$YML_BUILD)"

      - name: Build macOS installers (DMG + PKG, with Oriel Engine / CEF)
        env:
          ORIEL_MARKETING_VERSION: ${{ steps.version.outputs.marketing }}
          ORIEL_BUILD_NUMBER: ${{ steps.version.outputs.build }}
          ORIEL_BUNDLE_CEF: "1"
        run: bash Scripts/make-macos-dmg.sh

      - name: Upload macOS installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Oriel-macOS-Installers
          path: |
            build/dmg/*.dmg
            build/dmg/*.pkg
            build/dmg/*.sha256
          if-no-files-found: error

      - name: Attach installers to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Oriel ${{ steps.version.outputs.marketing }} (${{ steps.version.outputs.build }})
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## Install (macOS) — no Terminal

            **Recommended:** download **Oriel-${{ steps.version.outputs.marketing }}-${{ steps.version.outputs.build }}-macOS.pkg**, double-click, and follow the installer. Oriel lands in **Applications** with **Oriel Engine** already inside.

            **Alternative:** download the **.dmg**, open it, drag **Oriel** into **Applications**.

            First launch: right-click Oriel → **Open** (ad-hoc signed build; Gatekeeper may warn once).

            You do **not** need `enable-cef-macos.sh` or any Terminal steps — Engine is bundled.

            Website: https://openoriel.com  
            Bundle ID: `net.inveil.oriel`

            ### Checksums

            See the attached `.sha256` files (SHA-256 of the DMG and PKG).
          files: |
            build/dmg/*.dmg
            build/dmg/*.pkg
            build/dmg/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
