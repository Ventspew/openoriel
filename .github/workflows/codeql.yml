name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 5 * * 1"

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (swift)
    runs-on: macos-15
    timeout-minutes: 60
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          for app in \
            /Applications/Xcode_16.4.app \
            /Applications/Xcode_16.3.app \
            /Applications/Xcode_16.2.app \
            /Applications/Xcode.app
          do
            if [[ -d "$app" ]]; then
              sudo xcode-select -s "$app/Contents/Developer"
              break
            fi
          done
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      - name: Build (Swift)
        run: |
          set -euo pipefail
          xcodegen generate
          # macOS-only destination: multiplatform target otherwise demands an iOS device SDK.
          xcodebuild \
            -scheme Oriel \
            -configuration Debug \
            -destination 'generic/platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData-codeql" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=YES \
            build

      # Soft-fail upload: GitHub rejects advanced SARIF while CodeQL default setup is enabled.
      # The Build step above still must succeed. Disable default setup under
      # Settings → Code security so uploads can succeed (see docs/CI.md).
      - name: Perform CodeQL Analysis
        continue-on-error: true
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:swift"
